<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04 — Vidéo Plein Écran — Lumière Beauty Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#C9A96E;--gl:#e8d5b0;--gd:#a07840;--r:'Cormorant Garamond',serif;--f:'Josefin Sans',sans-serif;--rad:var(--r4);
  /* ── NOMBRE D'OR φ = 1.618 ── */
  --phi:1.618;
  --s1:3px;--s2:5px;--s3:8px;--s4:13px;--s5:21px;--s6:34px;--s7:55px;--s8:89px;--s9:144px;
  --t0:6px;--t1:10px;--t2:16px;--t3:26px;--t4:42px;--t5:68px;--t6:110px;
  --r1:5px;--r2:8px;--r3:13px;--r4:21px;--r5:34px;
  --dur1:200ms;--dur2:324ms;--dur3:524ms;--dur4:847ms;--dur5:1371ms;--trans:background .3s ease,color .3s ease,border-color .3s ease}
[data-theme="dark"]{--bg:#0f0e0c;--bg2:#181614;--bg3:#1e1b17;--txt:#ffffff;--txt2:rgba(255,255,255,.7);--txt3:rgba(255,255,255,.38);--bdr:rgba(201,169,110,.12);--bdr2:rgba(255,255,255,.08);--bx:#181614;--bx-bdr:rgba(255,255,255,.06);--btn-gh:rgba(255,255,255,.07);--btn-gh-bdr:rgba(255,255,255,.18);--prog:rgba(255,255,255,.08);--mq-fade:rgba(15,14,12,1)}
[data-theme="light"]{--bg:#ffffff;--bg2:#f7f4ef;--bg3:#ede9e0;--txt:#0f0e0c;--txt2:rgba(15,14,12,.7);--txt3:rgba(15,14,12,.38);--bdr:rgba(201,169,110,.25);--bdr2:rgba(15,14,12,.1);--bx:#f7f4ef;--bx-bdr:rgba(15,14,12,.08);--btn-gh:rgba(15,14,12,.05);--btn-gh-bdr:rgba(15,14,12,.18);--prog:rgba(15,14,12,.08);--mq-fade:rgba(255,255,255,1)}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--txt);overflow-x:hidden;transition:var(--trans)}
.page{padding:60px 20px;min-height:100vh;background:var(--bg);transition:var(--trans)}
.sw{max-width:860px;margin:0 auto}
.ey{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:10px}
.st{font-family:var(--r);font-size:clamp(26px,3.5vw,46px);font-weight:300;line-height:1.1;margin-bottom:12px;color:var(--txt)}
.st em{color:var(--g);font-style:italic}
.ss{font-size:13px;font-weight:300;color:var(--txt2);max-width:52ch;line-height:1.8;margin-bottom:28px}
.bx{background:var(--bx);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;transition:var(--trans)}
.bx-head{padding:20px 24px 16px;text-align:center;border-bottom:1px solid var(--bx-bdr)}
.bx-head h3{font-family:var(--r);font-size:22px;font-weight:300;color:var(--txt)}
.btn-g{display:inline-flex;align-items:center;justify-content:center;background:var(--g);color:#111;font-family:var(--f);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:13px 26px;border-radius:999px;border:none;cursor:pointer;text-decoration:none;transition:all var(--dur2)}
.btn-g:hover{background:var(--txt);color:var(--bg);transform:translateY(-2px)}
.btn-gh{display:inline-flex;align-items:center;justify-content:center;background:var(--btn-gh);color:var(--txt);font-family:var(--f);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:13px 26px;border-radius:999px;border:1px solid var(--btn-gh-bdr);cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);transition:all var(--dur2)}
.btn-gh:hover{transform:translateY(-2px)}
.prog-bar{height:2px;background:var(--prog);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--g),var(--gl));transition:width linear}
.gold{color:var(--g)}.italic{font-style:italic}
/* TOGGLE */
#theme-btn{position:fixed;top:16px;right:16px;z-index:999;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1px solid var(--bdr);background:var(--bx);cursor:pointer;font-family:var(--f);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);transition:all var(--dur1);backdrop-filter:blur(10px)}
#theme-btn:hover{border-color:var(--g);color:var(--g)}
/* HERO */
.hero-full{position:relative;width:100%;min-height:100vh;overflow:hidden;background:#000;display:flex;align-items:flex-end}
.hero-bg-slides{position:absolute;inset:0}
.hero-bg{position:absolute;inset:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity var(--dur5) ease}
.hero-slide.on{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.hero-bg video{width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1}
.hero-bg img.fb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.68) 60%,rgba(0,0,0,.96) 100%)}
.hero-ov2{position:absolute;inset:0;z-index:2;background:radial-gradient(900px 500px at 20% 10%,rgba(201,169,110,.18),transparent 60%),linear-gradient(180deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.46) 45%,rgba(0,0,0,.84) 75%,rgba(0,0,0,.97) 100%);pointer-events:none}
.hero-cnt{position:relative;z-index:3;width:100%;max-width:1100px;margin:0 auto;padding:0 40px clamp(140px,16vw,200px);display:flex;flex-direction:column;gap:var(--s5)}
.hero-ky{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--g);font-weight:600}
.hero-tt{font-family:var(--r);font-size:clamp(40px,5.5vw,82px);font-weight:300;line-height:1;text-shadow:0 20px 60px rgba(0,0,0,.5);color:#fff}
.hero-sb{font-size:13px;font-weight:300;opacity:.78;max-width:50ch;line-height:1.7;color:#fff}
.hero-pills-w{position:absolute;bottom:26px;left:0;right:0;z-index:4;display:flex;justify-content:center}
.hero-pills-bar{display:flex;gap:6px;padding:9px 13px;background:rgba(0,0,0,.38);backdrop-filter:blur(12px);border:1px solid rgba(201,169,110,.15);border-radius:999px;flex-wrap:wrap;justify-content:center}
.hero-pill{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;padding:7px 12px;border-radius:999px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-family:var(--f);transition:all var(--dur1)}
.hero-pill:hover{color:rgba(255,255,255,.88)}
.hero-pill.on{color:var(--g);border-color:rgba(201,169,110,.42);background:rgba(201,169,110,.09)}
.hero-prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:5}
.hero-pf{height:100%;width:0%;background:linear-gradient(90deg,var(--g),var(--gl))}
.hero-pf.run{width:100%;transition:width 4.2s linear}
@media(max-width:680px){.hero-cnt{padding-left:18px;padding-right:18px;padding-bottom:clamp(120px,14vw,150px)}}
@media(prefers-reduced-motion:reduce){.hero-slide{transition:none}}
</style>
</head>
<body>

<script>
const $=id=>document.getElementById(id);
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('lm-theme',t);const b=$('theme-btn');if(b){b.querySelector('.ti').textContent=t==='dark'?'🌙':'☀️';b.querySelector('.tl').textContent=t==='dark'?'Dark':'Light';}}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
(function(){setTheme(localStorage.getItem('lm-theme')||'dark');})();
</script>
<button id="theme-btn" onclick="toggleTheme()"><span class="ti">🌙</span><span class="tl">Dark</span></button>

<style>
.vf-mute{position:absolute;bottom:20px;right:20px;z-index:4;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.vf-badges{position:absolute;top:50%;right:clamp(16px,4vw,50px);transform:translateY(-50%);z-index:4;display:flex;flex-direction:column;gap:10px}
.vf-badge{background:rgba(0,0,0,.4);backdrop-filter:blur(12px);border:1px solid rgba(201,169,110,.22);border-radius:var(--r3);padding:10px 14px;min-width:120px;opacity:0;animation:bdi .8s ease forwards}
.vf-badge:nth-child(1){animation-delay:.5s}.vf-badge:nth-child(2){animation-delay:.8s}.vf-badge:nth-child(3){animation-delay:1.1s}
@keyframes bdi{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.vf-badge span:first-child{display:block;font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g)}
.vf-badge span:last-child{font-family:var(--r);font-size:17px;font-weight:300;color:#fff;line-height:1.2}
@media(max-width:680px){.vf-badges{display:none}}
</style>
<div class="hero-full">
  <div class="hero-bg">
    <video id="vfv" autoplay muted playsinline preload="auto"
      poster="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=1400&q=80"></video>
    <img class="fb" src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=1400&q=80" alt="">
  </div>
  <div class="hero-ov2"></div>
  <div class="vf-badges">
    <div class="vf-badge"><span>Résultat</span><span>Naturel</span></div>
    <div class="vf-badge"><span>Formule</span><span>Premium</span></div>
    <div class="vf-badge"><span>Teintes</span><span>5 nuances</span></div>
  </div>
  <div class="hero-cnt" style="padding-bottom:clamp(80px,10vw,130px)">
    <div class="hero-ky">Beauty · Collection Signature</div>
    <h1 class="hero-tt">La beauté,<br><em class="gold italic">à l'état pur.</em></h1>
    <p class="hero-sb">Une formule pour révéler votre éclat naturel · Cinq teintes signature.</p>
    <div style="display:flex;gap:var(--s4);flex-wrap:wrap;margin-top:4px">
      <a href="#" class="btn-g">Explorer →</a>
      <a href="#" class="btn-gh">Trouver ma teinte</a>
    </div>
  </div>
  <button class="vf-mute" id="vfm">🔇</button>
  <div class="hero-prog"><div class="prog-fill" id="vff"></div></div>
</div>
<script>
const SHADES=[
  {name:'Perle', sub:'Nacré',  desc:"Légèreté nacrée — un voile de lumière sur la peau.",        color:'#F2E0CC',badge:null, img:'https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=900&q=80'},
  {name:'Ambre', sub:'Doré',   desc:"Chaleur dorée — l'éclat du soleil capturé en flacon.",      color:'#D4A574',badge:null, img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80'},
  {name:'Santal',sub:'Boisé',  desc:"Douceur boisée — une seconde peau naturellement parfaite.", color:'#B8865A',badge:null, img:'https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=900&q=80'},
  {name:'Cacao', sub:'Velouté',desc:"Profondeur veloutée — un rendu riche et sophistiqué.",      color:'#7B4F35',badge:'Best',img:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=900&q=80'},
  {name:'Onyx',  sub:'Intense',desc:"Intensité absolue — l'élégance à son état le plus pur.",    color:'#1E1410',badge:null, img:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=900&q=80'},
];
const VIDEO_SRCS=[
  'https://res.cloudinary.com/dy6joecsh/video/upload/v1773880534/3181513-hd_1280_720_25fps_r7clr7.mp4',
  'https://res.cloudinary.com/dy6joecsh/video/upload/v1773880555/3762912-hd_1280_720_50fps_bybc6z.mp4',
];

(function(){
  const v=$('vfv'),m=$('vfm'),f=$('vff');let vi=0;
  v.src=VIDEO_SRCS[0];v.load();v.play().catch(()=>{});
  v.addEventListener('ended',()=>{vi=(vi+1)%VIDEO_SRCS.length;v.style.opacity='.3';setTimeout(()=>{v.src=VIDEO_SRCS[vi];v.load();v.play();v.style.opacity='1';},200);});
  m.onclick=()=>{v.muted=!v.muted;m.textContent=v.muted?'🔇':'🔊';};
  v.addEventListener('timeupdate',()=>{if(v.duration)f.style.width=(v.currentTime/v.duration*100)+'%';});
})();
</script>
</body></html>
