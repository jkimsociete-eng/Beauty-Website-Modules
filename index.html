<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMIÈRE — Modules Premium</title>
  <meta name="description" content="Modules premium interactifs pour transformer un site beauté en expérience luxe, immersive et ultra-convertissante." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#080808;
      --bg-soft:#111111;
      --panel:rgba(16,16,16,.82);
      --panel-2:rgba(255,255,255,.04);
      --line:rgba(255,255,255,.08);
      --line-2:rgba(255,255,255,.12);
      --gold:#c8a96b;
      --gold-soft:rgba(200,169,107,.16);
      --text:#f5efe7;
      --muted:rgba(245,239,231,.72);
      --muted-2:rgba(245,239,231,.52);
      --shadow:0 20px 80px rgba(0,0,0,.45);
      --radius:28px;
      --radius-sm:18px;
      --max:1280px;
      --g1:1.618;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top, rgba(200,169,107,.08), transparent 30%),
        linear-gradient(180deg, #0a0a0a 0%, #0d0d0d 42%, #070707 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit;text-decoration:none}
    img,video{display:block;max-width:100%}
    button{font:inherit}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .section{
      padding:calc(44px * var(--g1)) 0;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,255,255,.62);
    }

    .eyebrow::before{
      content:"";
      width:34px;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--gold));
      display:block;
    }

    .title-serif{
      font-family:'Cormorant Garamond', serif;
      letter-spacing:.01em;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:50px;
      padding:0 22px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      transition:.28s ease;
      border:1px solid var(--line-2);
      cursor:pointer;
      white-space:nowrap;
    }

    .btn-primary{
      color:var(--text);
      border-color:rgba(212,179,115,.42);
      background:linear-gradient(180deg, rgba(212,179,115,.19), rgba(212,179,115,.08));
      box-shadow:0 10px 40px rgba(0,0,0,.25), 0 0 0 1px rgba(255,255,255,.02) inset;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      background:linear-gradient(180deg, rgba(212,179,115,.24), rgba(212,179,115,.12));
    }

    .btn-secondary{
      background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.9);
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,.08);
    }

    /* HEADER */
    .topbar{
      position:fixed;
      inset:0 0 auto 0;
      z-index:50;
      backdrop-filter:blur(18px);
      background:linear-gradient(180deg, rgba(7,7,7,.82), rgba(7,7,7,.38));
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      min-height:68px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      font-family:'Cormorant Garamond', serif;
      font-size:28px;
      letter-spacing:.08em;
    }
