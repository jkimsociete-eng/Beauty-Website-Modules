<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Website Modules — Engineering & Design</title>
  <meta name="description" content="Pack premium de modules interactifs haute performance." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #060607;
      --panel: #101017;
      --text: #f7f2ea;
      --gold: #d4af73;
      --gold-gradient: linear-gradient(180deg, #f2ddb3 0%, #d4af73 100%);
      --radius: 26px;
      --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- CUSTOM CURSOR SYSTEM (LE FIX DU POINTEUR) --- */
    #cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, background 0.3s;
    }
    #cursor-outline {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(212, 175, 115, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease-out;
    }

    /* --- LAYOUT --- */
    .container { width: min(1240px, 90%); margin: 0 auto; }
    .section { padding: 100px 0; }

    /* --- HERO --- */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      background: radial-gradient(circle at 50% 50%, rgba(212,175,115,0.08), transparent 70%);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      line-height: 1.1;
      margin-bottom: 20px;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 18px 40px;
      border-radius: 999px;
      background: var(--gold-gradient);
      color: #1a1208;
      font-weight: 800;
      text-decoration: none;
      transition: var(--transition);
      display: inline-block;
      box-shadow: 0 10px 30px rgba(212, 175, 115, 0.2);
    }

    .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(212, 175, 115, 0.4); }

    /* --- MODULES GRID (LE FIX DU MODULE 2) --- */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
    }

    .module-card {
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
      transition: var(--transition);
      height: 450px; /* Hauteur harmonisée */
    }

    /* FIX IMAGE MODULE 2 : Elle prend tout l'espace sans déformation */
    .module-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      transition: transform 0.8s ease;
    }

    .module-card:hover { border-color: var(--gold); transform: translateY(-10px); }
    .module-card:hover img { transform: scale(1.1); }

    .module-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px;
      background: linear-gradient(to top, rgba(6,6,7,0.9), transparent);
    }

    .module-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 800;
    }

    .module-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      margin-top: 5px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .modules-grid { grid-template-columns: 1fr; }
      * { cursor: auto !important; }
      #cursor-dot, #cursor-outline { display: none; }
    }
  </style>
</head>
<body>

  <div id="cursor-dot"></div>
  <div id="cursor-outline"></div>

  <section class="hero">
    <div class="container">
      <div class="eyebrow">Collection 2026</div>
      <h1>Premium Website <br><span style="font-style: italic;">Modules</span></h1>
      <p style="color: #b8ada0; max-width: 600px; margin: 20px auto 40px;">Optimisez vos conversions avec des composants Web de haute ingénierie.</p>
      <a href="#modules" class="btn">Voir les modules</a>
    </div>
  </section>

  <section id="modules" class="section container">
    <div class="modules-grid">
      <div class="module-card">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200" alt="UI Design">
        <div class="module-content">
          <div class="module-tag">Interaction</div>
