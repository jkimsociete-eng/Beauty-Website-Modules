<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Website Modules — Pack premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#060607; --bg2:#0b0b10; --panel:#101017; --panel2:#15151d;
      --text:#f7f2ea; --muted:#b8ada0; --line:rgba(255,255,255,.08);
      --gold:#d4af73; --gold2:#b98b4a; --gold3:#f2ddb3;
      --shadow:0 24px 70px rgba(0,0,0,.42); --radius:26px; --max:1240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif; color:var(--text);
      background: linear-gradient(180deg,#060607 0%, #0b0b10 100%);
      line-height:1.55; overflow-x:hidden;
    }

    /* --- FIX POINTEUR : On s'assure que les éléments décoratifs ne bloquent rien --- */
    .hero-bg-noise, .hero-bg-grid, .hero-glow, .hero-depth-ring, .hero-center-glow, .hero-card::before {
      pointer-events: none !important;
    }

    .container{ width:min(var(--max), calc(100% - 24px)); margin:0 auto; }
    .section{ padding:96px 0; position:relative; }

    /* --- TYPO & BOUTONS --- */
    h1,h2,h3{ font-family:'Cormorant Garamond',serif; }
    h1{ font-size:clamp(2.7rem, 6vw, 5.9rem); margin-top:18px; }
    .gold-text{ background:linear-gradient(180deg,var(--gold3), var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    
    .btn{
      min-height:56px; padding:0 32px; border-radius:999px;
      display:inline-flex; align-items:center; font-weight:800;
      transition:.25s ease; cursor:pointer; text-decoration:none;
    }
    .btn-primary{ background:linear-gradient(180deg,#e2c185, #c89853); color:#1a1208; }

    /* --- MODULES GRID --- */
    .modules-grid{
      display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:40px;
    }

    .module-card{
      position:relative; border-radius:24px; overflow:hidden;
      background:var(--panel); border:1px solid var(--line);
      transition: transform 0.3s ease;
      height: 400px; /* On fixe une hauteur pour la régularité */
    }

    /* --- FIX IMAGE MODULE 2 : Le remplissage parfait --- */
    .module-card img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* L'image remplit tout sans se déformer */
      display: block;
    }

    .module-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 24px; display: flex; flex-direction: column; justify-content: flex-end;
    }

    .module-card:hover { transform: translateY(-10px); border-color: var(--gold); }

    /* Responsivité */
    @media (max-width: 1000px) { .modules-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <section class="hero section">
    <div class="hero-bg-grid"></div>
    <div class="hero-glow hero-glow-1"></div>
    <div class="container">
      <div class="hero-copy">
        <span class="eyebrow">Ingénierie Web</span>
        <h1>L'excellence pour votre <span class="gold-text">E-commerce</span></h1>
        <p class="lead">Des modules optimisés pour transformer chaque visite en vente.</p>
        <div class="btn-row">
          <a href="#modules" class="btn btn-primary">Voir les modules</a>
        </div>
      </div>
    </div>
  </section>

  <section id="modules" class="section">
    <div class="container">
      <h2>Nos Modules <span class="gold-text">Premium</span></h2>
      <div class="modules-grid">
        <div class="module-card">
          <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" alt="Module 1">
          <div class="module-overlay">
            <h3>01. Interface Fluide</h3>
          </div>
        </div>

        <div class="module-card">
          <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=800" alt="Module 2">
          <div class="module-overlay">
            <h3>02. Panier Dynamique</h3>
          </div>
        </div>

        <div class="module-card">
          <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=800" alt="Module 3">
          <div class="module-overlay">
            <h3>03. Checkout Rapide</h3>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
