<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMIÈRE — Modules Digitaux Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#080808;
      --bg-soft:#111111;
      --panel:#131313;
      --panel-2:#1a1a1a;
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --text:#f6f1e8;
      --muted:#c9bfb0;
      --muted-2:#9c9284;
      --gold:#d2b06b;
      --gold-soft:#ecd4a0;
      --shadow:0 24px 60px rgba(0,0,0,.34);
      --radius:24px;
      --max:1380px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(210,176,107,.10), transparent 22%),
        radial-gradient(circle at top right, rgba(210,176,107,.05), transparent 18%),
        linear-gradient(180deg, #090909 0%, #070707 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit}
    img,video{display:block;max-width:100%}
    button{font:inherit}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    /* ─── TOP BAR ─────────────────────── */
    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(16px);
      background:rgba(8,8,8,.65);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-mark{
      width:38px;
      height:38px;
      border-radius:50%;
      background:
        radial-gradient(circle at 32% 30%, rgba(255,255,255,.24), transparent 32%),
        linear-gradient(145deg, #f0d49b, #9f7434);
      box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 8px 24px rgba(210,176,107,.24);
      flex:0 0 auto;
    }

    .brand-copy{
      min-width:0;
    }

    .brand-kicker{
      margin:0 0 4px;
      color:var(--gold-soft);
      font-size:11px;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      line-height:1;
    }

    .brand-name{
      margin:0;
      font-family:'Cormorant Garamond',serif;
      font-size:30px;
      line-height:1;
      letter-spacing:.04em;
    }

    /* ─── MODULE GRID ─────────────────────── */
    .module-card{
      position:relative;
      overflow:hidden;
      background:#131313;
      border-radius:18px;
      box-shadow:var(--shadow);
      transition:transform .3s ease, box-shadow .3s ease;
      cursor:pointer;
    }

    .module-card:hover{
      transform:scale(1.05);
      box-shadow:0 4px 30px rgba(0,0,0,.24);
    }

    .module-img-wrap{
      position:relative;
      height:220px;
    }

    .module-img-wrap img{
      object-fit:cover;
      object-position:center center;
      width:100%;
      height:100%;
      transition:opacity .3s ease;
    }

    .module-body{
      padding:16px;
    }

    .module-title{
      margin:12px 0;
      font-family:'Cormorant Garamond',serif;
      font-size:1.2rem;
      color:var(--text);
      line-height:1.2;
    }

    .module-desc{
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:20px;
    }

    .btn-demo{
      background:var(--gold);
      color:#fff;
      padding:10px 16px;
      border-radius:6px;
      border:none;
      cursor:pointer;
      font-size:1rem;
      font-weight:500;
      transition:background-color .3s ease;
    }

    .btn-demo:hover{
      background-color:var(--gold-soft);
    }

    .module-footer-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .module-mini-tag{
      font-size:.8rem;
      color:var(--muted);
      letter-spacing:.15em;
    }

    /* ─── COUNTER PLACES RESTANTES ─────────────────────── */
    .counter{
      font-size:2rem;
      font-weight:700;
      color:var(--gold);
    }

    /* ─── BENEFITS BAR ─────────────────────── */
    .benefits-bar{
      background:#111111;
      color:var(--gold);
      padding:16px;
      display:flex;
      justify-content:space-around;
      align-items:center;
      gap:32px;
    }

    .benefit{
      text-align:center;
      font-weight:500;
      font-size:.9rem;
    }

    .benefit-icon{
      margin-bottom:8px;
    }

    /* ─── MODAL WINDOW ─────────────────────── */
    #modal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100vw;
      height:100vh;
      background:rgba(0,0,0,.7);
      z-index:1000;
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:white;
      padding:32px;
      border-radius:10px;
      width:90%;
      max-width:700px;
    }

    #modal-close{
      font-size:24px;
      cursor:pointer;
      position:absolute;
      top:12px;
      right:12px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner container">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <p class="brand-kicker">LUMIÈRE</p>
          <h1 class="brand-name">Modules Digitaux Premium</h1>
        </div>
      </div>
    </div>
  </div>

  <section id="hero">
    <video autoplay muted loop>
      <source src="https://res.cloudinary.com/dy6joecsh/video/upload/v1774299724/VIDEO_DEMO_mq9oy8.mp4" type="video/mp4">
    </video>
    <div class="container">
      <div class="counter">
        <span id="places-left">15</span> places restantes
      </div>
    </div>
  </section>

  <div class="benefits-bar">
    <div class="benefit">
      <div class="benefit-icon">🌟</div>
      <div>Module clé en main</div>
    </div>
    <div class="benefit">
      <div class="benefit-icon">⚡</div>
      <div>Haute conversion</div>
    </div>
    <div class="benefit">
      <div class="benefit-icon">📦</div>
      <div>Pack complet</div>
    </div>
  </div>

  <div class="container">
    <div id="module-grid" class="module-grid">
      <!-- Module cards will go here dynamically -->
    </div>
  </div>

  <!-- Modal Window -->
  <div id="modal">
    <div class="modal-content">
      <span id="modal-close">✖</span>
      <iframe id="modal-iframe" width="100%" height="400" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script>
    // Handle opening and closing of the modal
    function openModal(file) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modal-iframe").src = file;
    }

    document.getElementById("modal-close").onclick = () => {
      document.getElementById("modal").style.display = "none";
      document.getElementById("modal-iframe").src = "";
    }

    // Module Data
    const modules = [
      {
        id: '01',
        title: 'Barre Header',
        file: '01-barre-annonce.html',
        img: 'https://res.cloudinary.com/dy6joecsh/image/upload/v1774829205/Capture_d_%C3%A9cran_834_snubou.png',
        type: 'Header',
        badge: 'Essentiel',
        desc: 'Barre d’annonce premium pour mettre en avant une offre ou un message clé.'
      },
      {
        id: '02',
        title: 'Hero Slideshow',
        file: '02-hero-slideshow.html',
        img: 'https://res.cloudinary.com/dy6joecsh/image/upload/v1774819689/Capture_d_%C3%A9cran_887_pzggwl.png',
        type: 'Hero',
        badge: 'Best seller',
        desc: 'Hero visuel avec rotation d’images pour capter l’attention dès l’arrivée.'
      },
      {
        id: '03',
        title: 'Vidéo Compacte',
        file: '03-video-compact.html',
        img: 'https://res.cloudinary.com/dy6joecsh/image/upload/v1774829183/Capture_d_%C3%A9cran_844_dsc89w.png',
        type: 'Vidéo',
        badge: 'Impact visuel',
        desc: 'Vidéo compacte pour présenter une démo ou une fonctionnalité rapidement.'
      },
      {
        id: '04',
        title: 'Vidéo Full Screen',
        file: '04-video-full.html',
        img: 'https://res.cloudinary.com/dy6joecsh/image/upload/v1774827974/Capture_d_%C3%A9cran_867_lbzsgl.png',
        type: 'Vidéo',
        badge: 'Immersion',
        desc: 'Vidéo en plein écran pour un effet plus immersif.'
      }
    ];

    // Render the module cards
    const grid = document.getElementById("module-grid");
    modules.forEach((m) => {
      const card = document.createElement("article");
      card.className = 'module-card';
      card.innerHTML = `
        <div class="module-img-wrap">
          <img src="${m.img}" alt="${m.title}">
        </div>
        <div class="module-body">
          <div class="module-badge-top">${m.badge}</div>
          <h3 class="module-title">${m.title}</h3>
          <p class="module-desc">${m.desc}</p>
          <div class="module-footer-row">
            <button class="btn-demo" onclick="openModal('${m.file}')">Voir la démo</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
