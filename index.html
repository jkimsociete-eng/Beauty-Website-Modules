<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIÈRE — Modules Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c8a96b;
  --bg:#0A0B0D;
  --ratio:1.618;
}

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:'Inter',sans-serif;
}

/* HERO */

.hero{
  position:relative;
  height:78vh;
  min-height:520px;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
}

/* TEXT */

.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:clamp(20px,5vw,80px);
  max-width:700px;
}

.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(34px,5vw,70px);
  line-height:1.1;
}

.hero p{
  opacity:0.7;
  margin-top:20px;
  font-size:clamp(14px,1.2vw,18px);
}

/* CTA */

.cta{
  margin-top:30px;
  display:inline-block;
  padding:14px 28px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-transform:uppercase;
  font-size:12px;
  letter-spacing:2px;
  transition:.4s;
}

.cta:hover{
  background:var(--gold);
  color:black;
}

/* SECTION */

.section{
  padding:calc(80px * var(--ratio)) 20px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */

.card{
  position:relative;
  overflow:hidden;
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  transition:.6s;
}

.card:hover img{
  transform:scale(1.05);
}

.card-content{
  position:absolute;
  bottom:0;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* VIDEO SECTION */

.video-full{
  position:relative;
  height:70vh;
}

.video-full video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MOBILE */

@media(max-width:768px){

.hero{
  height:70vh;
}

.hero-content{
  justify-content:flex-end;
}

.hero h1{
  font-size:34px;
}

}

/* ANIMATION */

.fade-up{
  opacity:0;
  transform:translateY(30px);
  transition:.8s;
}

.fade-up.visible{
  opacity:1;
  transform:none;
}
</style>
</head>

<body>

<!-- HERO VIDEO -->

<section class="hero">

<video autoplay muted loop playsinline>
<source src="https://res.cloudinary.com/dy6joecsh/video/upload/v1774299724/VIDEO_DEMO_mq9oy8.mp4" type="video/mp4">
</video>

<div class="hero-overlay"></div>

<div class="hero-content fade-up">
<h1>L’expérience digitale<br>qui fait vendre</h1>

<p>Modules interactifs premium pour transformer ton site en machine à conversion.</p>

<a href="#" class="cta">Découvrir</a>
</div>

</section>

<!-- MODULES GRID -->

<section class="section">

<div class="grid">

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774819689/Capture_d_%C3%A9cran_887_pzggwl.png">
<div class="card-content">
<h3>Hero Slideshow</h3>
</div>
</div>

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774829183/Capture_d_%C3%A9cran_844_dsc89w.png">
<div class="card-content">
<h3>Vidéo Compacte</h3>
</div>
</div>

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774827974/Capture_d_%C3%A9cran_867_lbzsgl.png">
<div class="card-content">
<h3>Vidéo Full</h3>
</div>
</div>

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774827889/Capture_d_%C3%A9cran_898_ydk4dx.png">
<div class="card-content">
<h3>Comparateur</h3>
</div>
</div>

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774827855/Capture_d_%C3%A9cran_902_rwbfen.png">
<div class="card-content">
<h3>Quiz</h3>
</div>
</div>

<div class="card fade-up">
<img src="https://res.cloudinary.com/dy6joecsh/image/upload/v1774823370/Capture_d_%C3%A9cran_908_f3d2ig.png">
<div class="card-content">
<h3>Selecteur</h3>
</div>
</div>

</div>

</section>

<!-- VIDEO IMMERSIVE -->

<section class="video-full">
<video autoplay muted loop playsinline>
<source src="https://res.cloudinary.com/dy6joecsh/video/upload/v1774299724/VIDEO_DEMO_mq9oy8.mp4" type="video/mp4">
</video>
</section>

<!-- CTA FINAL -->

<section class="section fade-up" style="text-align:center">

<h2 style="font-family:Cormorant Garamond;font-size:40px;">
Passe au niveau supérieur
</h2>

<p style="opacity:.7;margin-top:10px;">
30 premières places — il en reste 17
</p>

<a class="cta" href="#">Obtenir le pack</a>

</section>

<script>

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('visible');
}
});
});

document.querySelectorAll('.fade-up').forEach(el=>{
observer.observe(el);
});

</script>

</body>
</html>
