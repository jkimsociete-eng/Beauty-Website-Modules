<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE Beauty — Pack Expert 14 Modules</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,500&family=Inter:wght@200;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --gold: #C9A96E; --ink: #060606; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ink); color: white; overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        .gold-shimmer {
            background: linear-gradient(90deg, #8a6d3b, #f2d492, #8a6d3b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }

        .video-overlay {
            background: linear-gradient(to bottom, rgba(6,6,6,0.5), rgba(6,6,6,0.3), rgba(6,6,6,1));
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Modal Démo */
        #demo-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); }
        .modal-content { background: #0f0f0f; border: 1px solid var(--gold); border-radius: 30px; width: 95%; max-width: 1100px; height: 85vh; overflow: hidden; position: relative; }
        
        .module-card { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease; cursor: pointer; }
        .module-card:hover { border-color: var(--gold); transform: translateY(-8px); }

        iframe { background: white; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="relative h-screen w-full overflow-hidden flex items-center justify-center">
        <div class="absolute inset-0 z-0">
            <video autoplay muted loop playsinline class="h-full w-full object-cover">
                <source src="https://res.cloudinary.com/dy6joecsh/video/upload/v1773880534/3181513-hd_1280_720_25fps_r7clr7.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 video-overlay"></div>
        </div>

        <div class="relative z-10 text-center px-6">
            <span class="reveal text-[10px] font-bold uppercase tracking-[0.5em] text-[var(--gold)] mb-6 block">Collection 2026</span>
            <h1 class="reveal text-6xl md:text-9xl font-serif leading-none mb-8">
                L'Art de la<br><span class="gold-shimmer italic">Conversion.</span>
            </h1>
            <p class="reveal text-xs md:text-sm font-light tracking-[0.2em] uppercase opacity-60 mb-12 max-w-lg mx-auto">14 Modules Premium pour élever votre marque</p>
            <div class="reveal flex flex-col md:flex-row gap-6 justify-center items-center">
                <a href="https://lumirebeauty.gumroad.com/l/pdlbdu" class="bg-[var(--gold)] text-black px-12 py-5 rounded-full font-bold text-[10px] uppercase tracking-widest hover:bg-white transition-all w-full md:w-auto text-center">Acheter le Pack</a>
                <a href="#catalogue" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest opacity-60 hover:opacity-100">Explorer les démos <i data-lucide="arrow-down" class="w-4 h-4"></i></a>
            </div>
        </div>
    </section>

    <!-- CATALOGUE -->
    <section id="catalogue" class="py-32 px-6 bg-[#060606]">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-24 reveal">
                <h2 class="text-5xl md:text-7xl font-serif mb-4">Le Catalogue</h2>
                <p class="text-white/30 text-xs uppercase tracking-widest">Cliquez sur une carte pour tester le module</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid">
                <!-- Les 14 modules seront injectés ici -->
            </div>
        </div>
    </section>

    <!-- MODAL DE DÉMO -->
    <div id="demo-modal" class="flex items-center justify-center p-4">
        <div class="modal-content flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black">
                <h3 id="modal-title" class="font-serif text-xl md:text-2xl text-[var(--gold)]">Démo</h3>
                <button onclick="closeDemo()" class="text-white/50 hover:text-white flex items-center gap-2 text-[10px] uppercase font-bold">Fermer <i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 relative">
                <iframe id="demo-frame" src="" class="w-full h-full border-none"></iframe>
                <div id="loader" class="absolute inset-0 bg-black flex items-center justify-center text-[var(--gold)] font-serif italic text-xl">Expérience en cours de chargement...</div>
            </div>
        </div>
    </div>

    <!-- DOCK FIXE -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md">
        <div class="bg-black/60 backdrop-blur-xl rounded-full px-8 py-4 flex items-center justify-between border border-white/10 shadow-2xl">
            <span class="font-serif italic text-2xl gold-shimmer">L.</span>
            <a href="https://lumirebeauty.gumroad.com/l/pdlbdu" class="bg-[var(--gold)] text-black px-6 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest">Acheter 79€</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Liste complète basée sur vos fichiers GitHub
        const modules = [
            { id: "01", title: "Barre d'annonce", file: "01-barre-annonce.html", img: "https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=500&q=60" },
            { id: "02", title: "Hero Slideshow", file: "02-hero-slideshow.html", img: "https://images.unsplash.com/photo-1526045431048-f857369aba09?auto=format&fit=crop&w=500&q=60" },
            { id: "03", title: "Vidéo Compacte", file: "03-video-compact.html", img: "https://images.unsplash.com/photo-1596462502278-27bfad4503e6?auto=format&fit=crop&w=500&q=60" },
            { id: "04", title: "Vidéo Fullscreen", file: "04-video-full.html", img: "https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&w=500&q=60" },
            { id: "05", title: "Hero Panel", file: "05-hero-panel.html", img: "https://images.unsplash.com/photo-1515377666659-7678cb10ee03?auto=format&fit=crop&w=500&q=60" },
            { id: "06", title: "Marquee Défilant", file: "06-marquee.html", img: "https://images.unsplash.com/photo-1527633412826-79f502f48043?auto=format&fit=crop&w=500&q=60" },
            { id: "07", title: "Comparateur", file: "07-comparateur.html", img: "https://images.unsplash.com/photo-1512203530485-25a7d33973e8?auto=format&fit=crop&w=500&q=60" },
            { id: "08", title: "Quiz Teinte", file: "08-quiz.html", img: "https://images.unsplash.com/photo-1596704017254-9b121068fb31?auto=format&fit=crop&w=500&q=60" },
            { id: "09", title: "Sélecteur Visuel", file: "09-selecteur.html", img: "https://images.unsplash.com/photo-1522338223523-dcacaf132d93?auto=format&fit=crop&w=500&q=60" },
            { id: "10", title: "Guide des Tailles", file: "10-guide-tailles.html", img: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=500&q=60" },
            { id: "11", title: "Showcase Produit", file: "11-showcase.html", img: "https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?auto=format&fit=crop&w=500&q=60" },
            { id: "12", title: "Dock Interactif", file: "12-dock.html", img: "https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=500&q=60" },
            { id: "13", title: "Capture Email", file: "13-email-valeurs.html", img: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=500&q=60" },
            { id: "00", title: "Pack Complet", file: "00-pack-complet.html", img: "https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=500&q=60" }
        ];

        const grid = document.getElementById('grid');
        modules.forEach(m => {
            const card = document.createElement('div');
            card.className = 'reveal module-card rounded-[30px] overflow-hidden group';
            card.onclick = () => openDemo(m.title, m.file);
            card.innerHTML = `
                <div class="h-56 overflow-hidden relative">
                    <img src="${m.img}" class="w-full h-full object-cover opacity-40 group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] to-transparent"></div>
                    <span class="absolute top-6 left-6 font-serif text-4xl opacity-20 group-hover:opacity-100 group-hover:text-[var(--gold)] transition-all">${m.id}</span>
                </div>
                <div class="p-8">
                    <h3 class="text-xl font-serif mb-4 group-hover:text-[var(--gold)] transition-colors">${m.title}</h3>
                    <div class="flex items-center gap-2 text-[9px] font-bold uppercase tracking-widest text-[var(--gold)]">Tester le module <i data-lucide="play" class="w-3 h-3"></i></div>
                </div>
            `;
            grid.appendChild(card);
        });

        function openDemo(title, file) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('demo-frame').src = file;
            document.getElementById('demo-modal').style.display = 'flex';
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('demo-frame').onload = () => {
                document.getElementById('loader').style.display = 'none';
            };
        }

        function closeDemo() {
            document.getElementById('demo-modal').style.display = 'none';
            document.getElementById('demo-frame').src = '';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
