<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    name="description"
    content="Pack de modules premium pour Shopify, IONOS, Webflow, Wix, Squarespace et sites e-commerce. Démo luxe, immersive et ultra-convertissante."

  <meta property="og:description" content="13 modules premium pour transformer une boutique classique en expérience visuelle plus désirable, plus crédible, plus vendeuse." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070707;
      --bg-2:#0d0d0d;
      --panel:rgba(20,20,20,.78);
      --panel-2:rgba(255,255,255,.045);
      --line:rgba(255,255,255,.08);
      --line-2:rgba(255,255,255,.14);
      --gold:#c8a96b;
      --gold-2:#d9ba7f;
      --gold-soft:rgba(200,169,107,.16);
      --text:#f7f0e7;
      --muted:rgba(247,240,231,.74);
      --muted-2:rgba(247,240,231,.54);
      --shadow:0 24px 80px rgba(0,0,0,.42);
      --radius-xl:34px;
      --radius-lg:26px;
      --radius-md:18px;
      --max:1280px;
      --header-h:72px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top, rgba(200,169,107,.10), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(200,169,107,.05), transparent 20%),
        linear-gradient(180deg,#080808 0%, #0d0d0d 42%, #070707 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    img,video{display:block;max-width:100%}
    button,input{font:inherit}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .section{
      position:relative;
      padding:92px 0;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,255,255,.62);
    }

    .eyebrow::before{
      content:"";
      width:34px;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--gold));
      display:block;
    }

    .title-serif{
      font-family:'Cormorant Garamond',serif;
      letter-spacing:.01em;
    }

    .btn{
      position:relative;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      padding:0 22px;
      border-radius:999px;
      border:1px solid var(--line-2);
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      white-space:nowrap;
      transition:transform .28s ease, background .28s ease, border-color .28s ease, box-shadow .28s ease;
      will-change:transform;
      cursor:pointer;
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      transform:translateX(-130%);
      transition:transform .8s ease;
    }

    .btn:hover::after{transform:translateX(130%)}
    .btn:hover{transform:translateY(-2px)}

    .btn-primary{
      color:var(--text);
      border-color:rgba(212,179,115,.42);
      background:linear-gradient(180deg, rgba(212,179,115,.22), rgba(212,179,115,.08));
      box-shadow:0 10px 36px rgba(0,0,0,.25);
    }

    .btn-primary:hover{
      background:linear-gradient(180deg, rgba(212,179,115,.30), rgba(212,179,115,.12));
      box-shadow:0 18px 44px rgba(0,0,0,.30);
    }

    .btn-secondary{
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.94);
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,.09);
      border-color:rgba(255,255,255,.18);
    }

    .btn-ghost{
      background:transparent;
      color:var(--gold);
      border-color:rgba(200,169,107,.38);
    }

    .progress-bar{
      position:fixed;
      top:0;
      left:0;
      width:0%;
      height:2px;
      z-index:300;
      background:linear-gradient(90deg, var(--gold), var(--gold-2));
      box-shadow:0 0 18px rgba(200,169,107,.45);
    }

    .topbar{
      position:fixed;
      inset:0 0 auto 0;
      z-index:200;
      min-height:var(--header-h);
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg, rgba(8,8,8,.88), rgba(8,8,8,.40));
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      width:min(var(--max), calc(100% - 24px));
      min-height:var(--header-h);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      font-family:'Cormorant Garamond',serif;
      font-size:30px;
      letter-spacing:.10em;
      white-space:nowrap;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      font-size:13px;
      color:rgba(255,255,255,.74);
    }

    .nav a{
      position:relative;
      transition:color .25s ease;
    }

    .nav a:not(.nav-cta)::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:1px;
      background:var(--gold);
      transition:width .28s ease;
    }

    .nav a:not(.nav-cta):hover::after{width:100%}
    .nav a:hover{color:#fff}

    .nav-cta{
      padding:10px 15px;
      border-radius:999px;
      border:1px solid rgba(200,169,107,.45);
      background:rgba(200,169,107,.07);
      color:var(--gold);
    }

    .hero{
      position:relative;
      min-height:100svh;
      padding-top:var(--header-h);
      display:flex;
      align-items:flex-end;
      overflow:hidden;
    }

    .hero-media{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .hero-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.05);
      transition:opacity 1.1s ease, transform 6.5s ease;
      filter:brightness(.80) saturate(.95) contrast(1.02);
    }

    .hero-video.active{
      opacity:1;
      transform:scale(1.01);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 70% 24%, rgba(255,255,255,.06), transparent 20%),
        linear-gradient(180deg, rgba(0,0,0,.12) 0%, rgba(0,0,0,.36) 44%, rgba(0,0,0,.92) 100%);
    }

    .hero-overlay::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(8,8,8,.88) 0%, rgba(8,8,8,.54) 35%, rgba(8,8,8,.18) 68%, rgba(8,8,8,.56) 100%);
    }

    .hero-grid{
      position:relative;
      z-index:2;
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
      padding:76px 0 50px;
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(320px, .60fr);
      gap:34px;
      align-items:end;
    }

    .hero-copy{
      max-width:760px;
    }

    .hero-copy h1{
      margin:18px 0 0;
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(48px, 7.5vw, 104px);
      line-height:.92;
      letter-spacing:-.03em;
      font-weight:600;
      text-wrap:balance;
    }

    .hero-copy p{
      margin:22px 0 0;
      max-width:650px;
      font-size:clamp(15px,1.4vw,18px);
      line-height:1.8;
      color:var(--muted);
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:30px;
    }

    .hero-proof{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:20px;
    }

    .proof-pill{
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.76);
      backdrop-filter:blur(8px);
    }

    .hero-card{
      justify-self:end;
      width:min(100%, 420px);
      padding:22px;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(18,18,18,.80), rgba(12,12,12,.76));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }

    .limited{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:16px;
    }

    .limited-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--gold);
      box-shadow:0 0 14px rgba(200,169,107,.64);
      animation:pulse 1.6s infinite;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:1}
      50%{transform:scale(1.35);opacity:.6}
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .mini-stat{
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.06);
      transition:transform .28s ease, border-color .28s ease, background .28s ease;
    }

    .mini-stat:hover{
      transform:translateY(-2px);
      border-color:rgba(200,169,107,.20);
      background:rgba(255,255,255,.05);
    }

    .mini-stat strong{
      display:block;
      font-size:24px;
      font-weight:700;
    }

    .mini-stat span{
      display:block;
      margin-top:6px;
      font-size:12px;
      color:rgba(255,255,255,.64);
      line-height:1.45;
    }

    .compat-strip{
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.018);
      overflow:hidden;
    }

    .marquee{
      display:flex;
      width:max-content;
      min-width:100%;
      animation:marquee 28s linear infinite;
    }

    .marquee-track{
      display:flex;
      align-items:center;
      gap:18px;
      padding:16px 18px;
      white-space:nowrap;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,.60);
    }

    .marquee-track span{
      display:inline-flex;
      align-items:center;
      gap:18px;
    }

    .marquee-track span::after{
      content:"•";
      color:var(--gold);
    }

    @keyframes marquee{
      from{transform:translateX(0)}
      to{transform:translateX(-50%)}
    }

    .feature-wrap{
      display:grid;
      grid-template-columns:1.02fr .98fr;
      gap:28px;
      align-items:center;
    }

    .video-shell{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-xl);
      border:1px solid rgba(255,255,255,.08);
      background:#000;
      box-shadow:var(--shadow);
      aspect-ratio:16/9;
      isolation:isolate;
      min-height:320px;
    }

    .video-shell::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 18% 85%, rgba(200,169,107,.12), transparent 25%);
      z-index:1;
      pointer-events:none;
    }

    .video-shell video{
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
    }

    .video-badge{
      position:absolute;
      top:16px;
      left:16px;
      z-index:3;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(8,8,8,.56);
      border:1px solid rgba(255,255,255,.10);
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,.88);
      backdrop-filter:blur(10px);
    }

    .glow{
      position:absolute;
      left:-90px;
      bottom:-90px;
      width:250px;
      height:250px;
      background:radial-gradient(circle, rgba(200,169,107,.26), transparent 70%);
      filter:blur(8px);
      pointer-events:none;
      z-index:2;
    }

    .content-card{
      padding:36px;
      border-radius:var(--radius-xl);
      background:linear-gradient(180deg, rgba(18,18,18,.82), rgba(12,12,12,.95));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
    }

    .content-card h2{
      margin:14px 0 0;
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(38px,4vw,58px);
      line-height:.96;
      font-weight:600;
      letter-spacing:-.02em;
    }

    .content-card p{
      margin:16px 0 0;
      color:var(--muted);
      line-height:1.8;
      font-size:15px;
    }

    .bullet-list{
      margin:22px 0 0;
      display:grid;
      gap:12px;
    }

    .bullet{
      display:flex;
      gap:12px;
      align-items:flex-start;
      color:rgba(255,255,255,.86);
      font-size:14px;
      line-height:1.65;
    }
